<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
      color: #e0e0e0;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.x {
      color: #ff6b6b;
    }

    .cell.o {
      color: #51cf66;
    }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(160, 196, 255, 0.35);
    }

    #restart {
      margin-top: 2rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    #restart:hover {
      background: #c73652;
      transform: scale(1.04);
    }

    #score {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
    }

    .score-box .label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-box .value {
      font-size: 2rem;
      font-weight: bold;
    }

    .score-box.x .value { color: #ff6b6b; }
    .score-box.draw .value { color: #aaa; }
    .score-box.o .value { color: #51cf66; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="score">
  <div class="score-box x">
    <div class="label">X Wins</div>
    <div class="value" id="score-x">0</div>
  </div>
  <div class="score-box draw">
    <div class="label">Draws</div>
    <div class="value" id="score-draw">0</div>
  </div>
  <div class="score-box o">
    <div class="label">O Wins</div>
    <div class="value" id="score-o">0</div>
  </div>
</div>

<div id="status">X's turn</div>

<div id="board">
  <div class="cell" data-index="0"></div>
  <div class="cell" data-index="1"></div>
  <div class="cell" data-index="2"></div>
  <div class="cell" data-index="3"></div>
  <div class="cell" data-index="4"></div>
  <div class="cell" data-index="5"></div>
  <div class="cell" data-index="6"></div>
  <div class="cell" data-index="7"></div>
  <div class="cell" data-index="8"></div>
</div>

<button id="restart">Restart</button>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board = Array(9).fill(null);
  let current = 'X';
  let gameOver = false;
  const score = { X: 0, O: 0, draw: 0 };

  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');

  cells.forEach(cell => cell.addEventListener('click', () => {
    const i = +cell.dataset.index;
    if (gameOver || board[i]) return;

    board[i] = current;
    cell.textContent = current;
    cell.classList.add(current.toLowerCase(), 'taken');

    const winLine = getWinner();
    if (winLine) {
      winLine.forEach(idx => cells[idx].classList.add('win'));
      status.textContent = `${current} wins!`;
      score[current]++;
      updateScore();
      gameOver = true;
    } else if (board.every(Boolean)) {
      status.textContent = "It's a draw!";
      score.draw++;
      updateScore();
      gameOver = true;
    } else {
      current = current === 'X' ? 'O' : 'X';
      status.textContent = `${current}'s turn`;
    }
  }));

  document.getElementById('restart').addEventListener('click', reset);

  function getWinner() {
    for (const line of WINS) {
      const [a, b, c] = line;
      if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
    }
    return null;
  }

  function updateScore() {
    document.getElementById('score-x').textContent = score.X;
    document.getElementById('score-o').textContent = score.O;
    document.getElementById('score-draw').textContent = score.draw;
  }

  function reset() {
    board = Array(9).fill(null);
    current = 'X';
    gameOver = false;
    status.textContent = "X's turn";
    cells.forEach(cell => {
      cell.textContent = '';
      cell.className = 'cell';
    });
  }
</script>

</body>
</html>
